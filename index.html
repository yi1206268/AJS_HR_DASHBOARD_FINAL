// ─── MATCHING ALGORITHM ────────────────────────────────────────────────────────
function computeScore(absent, candidate) {
  if (candidate.dept === absent.dept) return -1;
  if (candidate.group !== absent.group) return 5; // 그룹 불일치: 긴급시만(5점)
  let score = 40; // ① 도메인 일치

  // ② G레벨 적합성 (25점)
  const diff = candidate.gradeNum - absent.gradeNum;
  if (diff === 0) score += 25;
  else if (diff === 1) score += 20;
  else if (diff === -1) score += 12;
  else if (Math.abs(diff) === 2) score -= 5;
  else return 3;

  // 핵심 공정(score≥5.0): 하위 레벨 투입 시 상한 캡
  if (absent.processScore >= 5.0 && candidate.gradeNum < absent.gradeNum) score = Math.min(score, 5);
  // 저난이도(score<3.0): 과잉 투입 페널티
  if (absent.processScore < 3.0 && (candidate.gradeNum - absent.gradeNum) > 1) score -= 15;

  // ③ 공정 중요도 제약 (15점)
  if (candidate.processScore <= absent.processScore) score += 15;
  else score -= Math.round((candidate.processScore - absent.processScore) * 3);

  // ④ 같은 층 보너스 (10점, A-1/A-2 그룹만)
  if ((absent.group === "A-1" || absent.group === "A-2") && candidate.floor === absent.floor) score += 10;

  // ⑤ 서브레벨 보너스 (10점)
  score += {"G3-B":5,"G3-C":8,"G4-B":15,"G4-C":12}[candidate.subLevel] || 0;

  // ⑥ 소규모 공정 차출 페널티 (-20점)
  if ((DEPT_HEADCOUNT[candidate.dept] || 1) <= 10) score -= 20;

  return Math.max(score, 0);
}

// 복수 결근 동시 처리
function batchMatch(absentIds, allWorkers) {
  const absentList = allWorkers.filter(w => absentIds.has(w.id));
  const sorted = [...absentList].sort((a,b) => b.processScore - a.processScore);
  const assigned = new Set(absentIds);
  const result = {};
  sorted.forEach(absent => {
    const candidates = allWorkers
      .filter(w => !assigned.has(w.id))
      .map(w => {
        const sc = computeScore(absent, w);
        const deptN = DEPT_HEADCOUNT[w.dept] || 1;
        const impactPct = Math.round(1/deptN*100);
        return {...w, matchScore:sc, impactPct, impactWarn: impactPct >= 20};
      })
      .filter(w => w.matchScore > 0)
      .sort((a,b) => b.matchScore - a.matchScore)
      .slice(0, 3);
    result[absent.id] = candidates;
    if (candidates[0]) assigned.add(candidates[0].id);
  });
  return result;
}

// ─── HR 시스템 계산 ────────────────────────────────────────────────────────────
function computeRiskScores(workers = WORKERS, absenceRates = LINE_ABS_RATES) {
  // workers에서 부서별 인원수 집계
  const deptN = {}, deptGroup = {}, deptScore = {};
  workers.forEach(w => {
    deptN[w.dept] = (deptN[w.dept]||0) + 1;
    deptGroup[w.dept] = w.group;
    deptScore[w.dept] = w.processScore;
  });
  // absenceRates (부서별 결근율 %)를 직접 사용
  return Object.entries(absenceRates)
    .filter(([dept]) => PROCESS_INFO[dept] && PROCESS_INFO[dept].group !== "F")
    .map(([dept, absRate]) => {
      const n = deptN[dept]||0;
      const group = deptGroup[dept]||PROCESS_INFO[dept]?.group||"?";
      const score = deptScore[dept]||PROCESS_INFO[dept]?.score||0;
      const up = UPSTREAM[dept] ?? 0.3;
      const risk = absRate/10*0.40 + score/10*0.35 + up*0.25;
      return {dept, group, score, headcount:n,
              absRate:+absRate.toFixed(2), riskScore:+(risk*100).toFixed(1)};
    })
    .sort((a,b) => b.riskScore - a.riskScore);
}

function computeChronicAbsentees(workers = WORKERS, workerAbsMap = {}) {
  // workerAbsMap이 비어있으면 WORKERS 내장 absentDays 사용
  const hasMap = Object.keys(workerAbsMap).length > 0;
  return workers
    .map(w => {
      const days = hasMap ? (workerAbsMap[w.id]||0) : w.absentDays;
      return {...w, absentDays: days};
    })
    .filter(w => w.absentDays >= 8)
    .map(w => ({...w, flag: w.gradeNum >= 4 ? "burnout" : "turnover"}))
    .sort((a,b) => b.absentDays - a.absentDays);
}

function getLineStatus(rate) {
  if (rate >= 6.5) return "danger";
  if (rate >= 5.5) return "warning";
  return "good";
}

// ─── REBALANCING ENGINE ───────────────────────────────────────────────────────
// 결근율 높은 공정 ↔ 낮은 공정 간 인력 재배치 추천
// 판단 기준: ① 결근율 편차 ② 그룹 호환성(매칭 알고리즘) ③ G레벨 적합성 ④ 소규모 공정 보호
function computeRebalanceSuggestions(allRates, workers = WORKERS) {
  const AVG = Object.values(allRates).reduce((s,v)=>s+v,0)/Object.values(allRates).length;
  const HIGH_THRESH = AVG + 0.5; // 평균+0.5%p 이상 = 고결근 공정
  const LOW_THRESH  = AVG - 0.5; // 평균-0.5%p 이하 = 저결근 공정

  const highDepts = Object.entries(allRates)
    .filter(([,r])=>r>=HIGH_THRESH)
    .sort((a,b)=>b[1]-a[1])
    .map(([d,r])=>({dept:d, rate:r, pi:PROCESS_INFO[d]}))
    .filter(x=>x.pi && x.pi.group!=="F");

  const lowDepts = Object.entries(allRates)
    .filter(([,r])=>r<=LOW_THRESH)
    .sort((a,b)=>a[1]-b[1])
    .map(([d,r])=>({dept:d, rate:r, pi:PROCESS_INFO[d]}))
    .filter(x=>x.pi && x.pi.group!=="F");

  const suggestions = [];

  for (const high of highDepts) {
    // 고결근 공정에서 결근이 잦은 직원 찾기 (absentDays 높은 순)
    const highWorkers = workers
      .filter(w => w.dept === high.dept && w.gradeNum > 0)
      .sort((a,b) => b.absentDays - a.absentDays)
      .slice(0, 3);

    for (const hw of highWorkers) {
      for (const low of lowDepts) {
        if (low.dept === high.dept) continue;
        const lowWorkers = workers
          .filter(w => w.dept === low.dept && w.gradeNum > 0)
          .sort((a,b) => a.absentDays - b.absentDays)
          .slice(0, 3);

        for (const lw of lowWorkers) {
          const hwToLow = computeScore({...hw, dept:high.dept}, {...lw, dept:low.dept});
          const lwToHigh = computeScore({...lw, dept:low.dept}, {...hw, dept:high.dept});
          const highN = workers.filter(w=>w.dept===high.dept).length||1;
          const lowN  = workers.filter(w=>w.dept===low.dept).length||1;
          if (highN <= 6 || lowN <= 6) continue;

          // 그룹 호환성: 동일 그룹 or 인접 그룹만
          const sameGroup = hw.group === lw.group;
          const groupScore = sameGroup ? 30 : (
            (hw.group==="A-1"&&lw.group==="A-2")||(hw.group==="A-2"&&lw.group==="A-1") ? 20 : 0
          );
          if (groupScore === 0) continue;

          // G레벨 차이 (±1 이내만)
          if (Math.abs(hw.gradeNum - lw.gradeNum) > 1) continue;

          // 결근율 편차 개선 효과
          const rateDiff = high.rate - low.rate;
          if (rateDiff < 0.3) continue; // 차이가 너무 작으면 스킵

          // 종합 추천 점수
          const compatScore = Math.max(0, hwToLow) + Math.max(0, lwToHigh);
          const totalScore = groupScore + compatScore * 0.3 + rateDiff * 10;

          suggestions.push({
            highDept: high.dept, highRate: high.rate,
            lowDept:  low.dept,  lowRate:  low.rate,
            rateDiff: +(rateDiff).toFixed(2),
            hwId: hw.id, hwName: hw.name, hwGrade: hw.grade, hwGroup: hw.group,
            hwAbsent: hw.absentDays, hwSubLevel: hw.subLevel,
            lwId: lw.id, lwName: lw.name, lwGrade: lw.grade, lwGroup: lw.group,
            lwAbsent: lw.absentDays, lwSubLevel: lw.subLevel,
            sameGroup, compatScore: +compatScore.toFixed(1),
            totalScore: +totalScore.toFixed(1),
          });
        }
      }
    }
  }

  // 중복 제거 (같은 직원 쌍 중 최고점만) 및 상위 8개
  const seen = new Set();
  return suggestions
    .sort((a,b)=>b.totalScore-a.totalScore)
    .filter(s=>{
      const key = [s.hwId,s.lwId].sort().join("|");
      if(seen.has(key)) return false;
      seen.add(key); return true;
    })
    .slice(0, 8);
}

// ─── ABSENCE TAB COMPONENT ────────────────────────────────────────────────────
function AbsenceTab({ workers: ACTIVE_WORKERS = WORKERS, absenceRates = LINE_ABS_RATES, workerAbsMap = {} }) {
  const [groupFilter, setGroupFilter] = useState("ALL");

  const statusStyle = s=>({
    danger:{bg:"#FCEBEB",color:"#A32D2D",label:"위험"},
    warning:{bg:"#FAEEDA",color:"#854F0B",label:"주의"},
    good:{bg:"#E1F5EE",color:"#085041",label:"양호"},
  }[s]||{bg:"#eee",color:"#333",label:"-"});

  // absenceRates: App에서 이미 계산된 값을 그대로 사용
  // (파일6 미업로드 → LINE_ABS_RATES, 업로드 → 업로드 데이터 기반)
  const allRates = Object.entries(absenceRates)
    .map(([dept,rate])=>({dept,rate,status:getLineStatus(rate),
      headcount: ACTIVE_WORKERS.filter(w=>w.dept===dept).length || DEPT_HEADCOUNT[dept]||0}))
    .sort((a,b)=>b.rate-a.rate);

  const groupLabels = {
    "ALL":"전체","A-1":"A-1 봉제2F","A-2":"A-2 봉제1F",
    "B":"B 전용기계","C":"C 보조","D":"D 재단","E":"E 후공정",
  };

  const filteredRates = groupFilter === "ALL"
    ? allRates
    : allRates.filter(r => (PROCESS_INFO[r.dept]?.group || "") === groupFilter);

  const suggestions = useMemo(
    () => computeRebalanceSuggestions(absenceRates, ACTIVE_WORKERS),
    [absenceRates, ACTIVE_WORKERS]
  );

  const avg = Object.values(absenceRates).reduce((s,v)=>s+v,0)/Math.max(Object.values(absenceRates).length,1);

  return (
    <div>
      {/* KPI 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[
          ["전체 공정 수", Object.keys(absenceRates).length+"개", "#8b949e"],
          ["위험 공정 (≥6.5%)", allRates.filter(l=>l.status==="danger").length+"개", "#f87171"],
          ["주의 공정 (≥5.5%)", allRates.filter(l=>l.status==="warning").length+"개", "#f59e0b"],
          ["전체 평균 결근율", avg.toFixed(2)+"%", "#34d399"],
        ].map(([label,val,col])=>(
          <div key={label} style={{background:"#161b22",border:"1px solid #21262d",borderRadius:6,padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#6e7681",marginBottom:3}}>{label}</div>
            <div style={{fontSize:18,fontWeight:700,color:col}}>{val}</div>
          </div>
        ))}
      </div>

      {/* 그룹 필터 */}
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
        {Object.entries(groupLabels).map(([key,label])=>{
          const [bg,col] = key==="ALL" ? ["#21262d","#e6edf3"] : (GROUP_COLOR[key]||["#21262d","#e6edf3"]);
          const isActive = groupFilter===key;
          return (
            <button key={key} onClick={()=>setGroupFilter(key)}
              style={{padding:"3px 10px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
                background:isActive?bg:"transparent",color:isActive?col:"#6e7681",
                outline:isActive?`1.5px solid ${col}`:"none"}}>
              {label}
            </button>
          );
        })}
      </div>
      <div style={{fontSize:10,color:"#6e7681",marginBottom:10}}>
        임계치: 🔴 위험 ≥6.5% | 🟡 주의 ≥5.5% | 🟢 양호 &lt;5.5% · 기준: 3-4월 정상 운영 평균 {avg.toFixed(2)}%
      </div>

      {/* 공정 결근율 카드 그리드 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:24}}>
        {filteredRates.map(({dept,rate,status,headcount})=>{
          const st = statusStyle(status);
          const barCol = status==="danger"?"#f87171":status==="warning"?"#f59e0b":"#34d399";
          const pi = PROCESS_INFO[dept];
          const [gbg,gcol] = GROUP_COLOR[pi?.group||"F"]||["#eee","#333"];
          return (
            <div key={dept} style={{background:"#161b22",border:"1px solid #21262d",borderRadius:6,padding:"10px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:"#e6edf3",marginBottom:2}}>{dept}</div>
                  <span style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:gbg,color:gcol}}>{pi?.group||"?"}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  <span style={{fontSize:9,color:"#6e7681"}}>{headcount}명</span>
                  <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:3,background:st.bg,color:st.color}}>{st.label}</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                <div style={{flex:1,height:5,background:"#21262d",borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:`${Math.min(rate/8*100,100)}%`,height:"100%",background:barCol,borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:barCol,width:36,textAlign:"right"}}>{rate}%</span>
              </div>
              {status!=="good"&&(
                <div style={{marginTop:4,fontSize:9,color:"#6e7681"}}>
                  {status==="danger"?"→ 매칭 우선 대체 풀 배정 권장":"→ 모니터링 권장"}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 인력 재배치 추천 */}
      <div style={{borderTop:"1px solid #21262d",paddingTop:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:"#f59e0b"}}>🔄 인력 재배치 추천</div>
        </div>
        {suggestions.length === 0 ? (
          <div style={{textAlign:"center",color:"#34d399",padding:"24px 0",fontSize:12}}>
            ✓ 현재 공정 간 결근율 편차가 낮아 재배치 추천 없음
          </div>
        ) : suggestions.map((s,i)=>{
          const diffCol = s.rateDiff >= 1.0 ? "#f87171" : s.rateDiff >= 0.5 ? "#f59e0b" : "#8b949e";
          const compatCol = s.compatScore >= 60 ? "#34d399" : s.compatScore >= 30 ? "#f59e0b" : "#f87171";
          const [hbg,hcol] = GROUP_COLOR[s.hwGroup]||["#eee","#333"];
          const [lbg,lcol] = GROUP_COLOR[s.lwGroup]||["#eee","#333"];
          return (
            <div key={i} style={{background:"#161b22",border:"1px solid #21262d",
              borderLeft:`3px solid ${i===0?"#f59e0b":"#30363d"}`,
              borderRadius:6,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:10,color:i===0?"#f59e0b":"#6e7681",fontWeight:700}}>#{i+1}</span>
                <span style={{fontSize:10,color:"#6e7681"}}>결근율 편차</span>
                <span style={{fontSize:11,fontWeight:700,color:diffCol}}>↓{s.rateDiff}%p</span>

                {s.sameGroup&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:"#E1F5EE",color:"#085041"}}>동일그룹</span>}
              </div>

              {/* 스왑 카드 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 32px 1fr",gap:6,alignItems:"center"}}>
                {/* 고결근 직원 → 저결근 공정으로 */}
                <div style={{background:"#1e1010",border:"1px solid #5c2a2a",borderRadius:5,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#f87171",marginBottom:3}}>고결근 공정 ({s.highRate}%)</div>
                  <div style={{fontSize:10,fontWeight:700,color:"#e6edf3",marginBottom:2}}>{s.hwName}</div>
                  <div style={{fontSize:9,color:"#8b949e",marginBottom:4}}>{s.highDept}</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:9,padding:"1px 5px",borderRadius:3,
                      background:`${GRADE_COLOR[s.hwGrade]||"#6b7280"}22`,
                      color:GRADE_COLOR[s.hwGrade]||"#6b7280"}}>{s.hwSubLevel||s.hwGrade}</span>
                    <span style={{fontSize:9,padding:"1px 4px",borderRadius:3,background:hbg,color:hcol}}>{s.hwGroup}</span>
                    <span style={{fontSize:9,color:"#f87171"}}>결근 {s.hwAbsent}일</span>
                  </div>
                </div>

                <div style={{textAlign:"center",fontSize:14,color:"#6e7681"}}>⇄</div>

                {/* 저결근 직원 → 고결근 공정으로 */}
                <div style={{background:"#101e10",border:"1px solid #2a5c2a",borderRadius:5,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#34d399",marginBottom:3}}>저결근 공정 ({s.lowRate}%)</div>
                  <div style={{fontSize:10,fontWeight:700,color:"#e6edf3",marginBottom:2}}>{s.lwName}</div>
                  <div style={{fontSize:9,color:"#8b949e",marginBottom:4}}>{s.lowDept}</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:9,padding:"1px 5px",borderRadius:3,
                      background:`${GRADE_COLOR[s.lwGrade]||"#6b7280"}22`,
                      color:GRADE_COLOR[s.lwGrade]||"#6b7280"}}>{s.lwSubLevel||s.lwGrade}</span>
                    <span style={{fontSize:9,padding:"1px 4px",borderRadius:3,background:lbg,color:lcol}}>{s.lwGroup}</span>
                    <span style={{fontSize:9,color:"#34d399"}}>결근 {s.lwAbsent}일</span>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── HR MANAGEMENT DASHBOARD ──────────────────────────────────────────────────
function HRDashboard({ workers: ACTIVE_WORKERS = WORKERS, absenceRates = LINE_ABS_RATES, workerAbsMap = {} }) {
  const [hrTab, setHrTab] = useState("absence");
  const riskScores = useMemo(()=>computeRiskScores(ACTIVE_WORKERS, absenceRates),[ACTIVE_WORKERS, absenceRates]);
  const chronic = useMemo(()=>computeChronicAbsentees(ACTIVE_WORKERS, workerAbsMap),[ACTIVE_WORKERS, workerAbsMap]);

  return (
    <div style={{flex:1,overflowY:"auto",padding:24,background:"#0d1117"}}>
      <div style={{display:"flex",gap:6,marginBottom:20,borderBottom:"1px solid #21262d",paddingBottom:0}}>
        {[["absence","📊 분기 결근율"],["risk","⚠ 인력 보충 선순위"],["chronic","🚨 만성 결근자"]].map(([key,label])=>(
          <button key={key} onClick={()=>setHrTab(key)}
            style={{padding:"7px 14px",background:"transparent",border:"none",
              borderBottom:hrTab===key?"2px solid #f59e0b":"2px solid transparent",
              color:hrTab===key?"#f59e0b":"#8b949e",cursor:"pointer",fontSize:12,fontWeight:500,marginBottom:-1}}>

        ))}

      {hrTab==="absence"&&(
        <AbsenceTab workers={ACTIVE_WORKERS} absenceRates={absenceRates} workerAbsMap={workerAbsMap}/>
      )}

      {hrTab==="risk"&&(
        <div>
          <div style={{fontSize:11,color:"#6e7681",marginBottom:12,lineHeight:1.7}}>
            복합 위험 스코어 = 결근율(40%) + 공정 난이도(35%) + 생산흐름 상류여부(25%)<br/>
            <span style={{color:"#f87171"}}>🔴 70+</span> 즉시 인력 보충 | <span style={{color:"#f59e0b"}}>🟡 50~70</span> 우선 모니터링 | <span style={{color:"#34d399"}}>🟢 50미만</span> 정상
          </div>
          {riskScores.slice(0,20).map((r,i)=>{
            const col=r.riskScore>=70?"#f87171":r.riskScore>=50?"#f59e0b":"#34d399";
            const [gbg,gcol]=GROUP_COLOR[r.group]||["#eee","#333"];
            return (
              <div key={r.dept} style={{background:"#161b22",border:"1px solid #21262d",borderRadius:6,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:20,fontSize:11,color:"#6e7681",fontWeight:700}}>#{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:600,color:"#e6edf3"}}>{r.dept}</span>
                    <span style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:gbg,color:gcol}}>{r.group}</span>
                    <span style={{fontSize:10,color:"#6e7681"}}>난이도 {r.score.toFixed(1)} · {r.headcount}명</span>
                  </div>
                  <div style={{fontSize:10,color:"#6e7681",display:"flex",gap:12}}>
                    <span>결근율 {r.absRate}%</span>
                    <span>상류 {((UPSTREAM[r.dept]??0.3)*100).toFixed(0)}%</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:col}}>{r.riskScore}</div>
                  <div style={{fontSize:9,color:"#6e7681"}}>위험점수</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {hrTab==="chronic"&&(
        <div>
          <div style={{fontSize:11,color:"#6e7681",marginBottom:12,lineHeight:1.7}}>
            기준: 3-4월(2개월) 결근 8일+ → 위험 플래그 | <span style={{color:"#f87171"}}>이직위험</span>: G2~G3 | <span style={{color:"#f59e0b"}}>번아웃</span>: G4+
          </div>
          {chronic.length===0?(
            <div>
              <div style={{textAlign:"center",color:"#34d399",padding:"30px 0",fontSize:13}}>✓ 현재 만성 결근자 없음 (2개월 기준 8일 미만)</div>
              <div style={{background:"#161b22",border:"1px solid #21262d",borderRadius:6,padding:14,fontSize:11,color:"#6e7681",marginTop:12}}>
                <div style={{marginBottom:6,color:"#e6edf3",fontWeight:600}}>탐지 기준</div>
                <div>• 3-4월 합산 결근 8일+ → 위험 플래그</div>
                <div>• G2~G3: 이직 위험 → 면담 및 인센티브 검토</div>
                <div>• G4+: 번아웃 신호 → 별도 케어 프로세스</div>
              </div>
            </div>
          ):chronic.map(w=>{
            const fc=w.flag==="burnout"?"#f59e0b":"#f87171";
            const fl=w.flag==="burnout"?"번아웃 위험":"이직 위험";
            return (
              <div key={w.id} style={{background:"#161b22",border:`1px solid ${fc}44`,borderLeft:`3px solid ${fc}`,borderRadius:6,padding:"10px 14px",marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontSize:12,fontWeight:600,color:"#e6edf3"}}>{w.name}</span>
                      <GradeChip grade={w.grade} sub={w.subLevel}/>
                    </div>
                    <div style={{fontSize:10,color:"#8b949e"}}>{w.dept} · {w.position}</div>
                    <div style={{fontSize:10,color:"#6e7681",marginTop:2}}>재직 {w.tenure.toFixed(0)}개월</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:20,fontWeight:800,color:fc}}>{w.absentDays}일</div>
                    <div style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:`${fc}22`,color:fc}}>{fl}</div>
                    <div style={{fontSize:9,color:"#6e7681",marginTop:3}}>→ 면담 트리거</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [mainTab, setMainTab] = useState("matching");
  const [uploadedWorkers, setUploadedWorkers] = useState(null);
  const [uploadedAbsence, setUploadedAbsence] = useState(null);
  const [uploadStatus, setUploadStatus] = useState({f1:null,f6:null});
  const today = new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"});

  const activeWorkers = uploadedWorkers || WORKERS;

  const handleUpload = async (e, fileType) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus(prev=>({...prev,[fileType]:"loading"}));
    try {
      const XLSX = await import("https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs");
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});

      if (fileType === "f1") {
        // ── 파일1 파싱 ─────────────────────────────────────────────
        // 핵심 로직:
        //  1) STT 숫자 행이 가장 많은 시트를 자동 선택 (SheetNames[0] 고정 X)
        //  2) STT(col0)가 양의 정수인 행 = 직원 행으로 판단
        //  3) 헤더 행에서 열 위치를 동적으로 탐색
        const grade_num_map = {G1:1,G2:2,G3:3,G4:4,G5:5};
        const ts_depts = new Set(["TS07.25","TS08.25","TS09.25","TS10.25","TS11.25","TS12.25","TS01.26"]);

        // STEP 1: STT 숫자 행이 가장 많은 시트 선택
        let bestSheetName = wb.SheetNames[0];
        let bestCount = 0;
        for (const sName of wb.SheetNames) {
          const sRows = XLSX.utils.sheet_to_json(wb.Sheets[sName], {header:1});
          let cnt = 0;
          for (const sRow of sRows) {
            if (!sRow) continue;
            const sv = sRow[0];
            if (typeof sv === 'number' && Number.isInteger(sv) && sv > 0) cnt++;
          }
          if (cnt > bestCount) { bestCount = cnt; bestSheetName = sName; }
        }
        const mainWs = wb.Sheets[bestSheetName];
        const rows = XLSX.utils.sheet_to_json(mainWs, {header:1});

        // STEP 2: 헤더 행에서 열 위치 탐색 (기본값: 원본 파일 기준)
        let colCode=1, colDept=3, colPos=4, colName=5, colGrade=9, colDate=2;
        for (let i = 0; i < Math.min(rows.length, 30); i++) {
          const row = rows[i];
          if (!row) continue;
          let found = false;
          for (let j = 0; j < row.length; j++) {
            const v = String(row[j]||"").trim().toUpperCase();
            if (v === "CODE" || v === "MSNV") { colCode = j; found = true; }
            if (v === "FULLNAME" || v === "HỌ VÀ TÊN" || v === "FULL NAME") colName = j;
            if (v === "DEPARTMENT" || v === "DEPT") colDept = j;
            if (v === "POSITIONS" || v === "POSITION") colPos = j;
            if (v.startsWith("GRADE")) colGrade = j;
            if (v === "STATED DATE" || v === "START DATE") colDate = j;
          }
          if (found) break;
        }

        // STEP 3: STT(col0)가 양의 정수인 행 = 직원 행으로 파싱
        const parsed = [];
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          if (!row) continue;
          const stt = row[0];
          // STT가 양의 정수인 행만 직원으로 인식
          if (typeof stt !== 'number' || !Number.isInteger(stt) || stt <= 0) continue;
          const dept = String(row[colDept]||"").trim();
          if (ts_depts.has(dept)) continue;
          const id = String(row[colCode]||"").trim();
          if (!id) continue;
          const position = String(row[colPos]||"").trim();
          const name = String(row[colName]||"").trim();
          const rawGrade = row[colGrade];
          const grade = (rawGrade !== undefined && rawGrade !== null && String(rawGrade).trim())
            ? String(rawGrade).trim() : "--";
          const pi = PROCESS_INFO[dept]||{group:"F",score:0,floor:"1F"};
          const gn = grade_num_map[grade]||0;
          const sub = grade==="G3"?"G3-A":grade==="G4"?"G4-A":grade;
          let startMs = 0;
          try {
            const rawDate = row[colDate];
            if (rawDate !== undefined && rawDate !== null) {
              const raw = String(rawDate).trim();
              if (/^\d+$/.test(raw)) {
                startMs = (parseInt(raw) - 25569) * 86400 * 1000;
              } else if (raw.includes("/")) {
                const p = raw.split("/");
                if (p.length === 3) startMs = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0])).getTime();
              } else {
                startMs = new Date(raw).getTime();
              }
            }
          } catch(e){}
          const tenure = (startMs && !isNaN(startMs))
            ? Math.round((new Date("2026-04-01").getTime()-startMs)/(1000*60*60*24*30.44)*10)/10 : 0;
          parsed.push({id, name, dept, position,
            grade, gradeNum:gn, subLevel:sub, tenure,
            group:pi.group, processScore:pi.score, floor:pi.floor, absentDays:0});
        }
        setUploadedWorkers(parsed);
        setUploadStatus(prev=>({...prev,f1:`✓ ${parsed.length}명 로드됨`}));
            } else {
        // 파일6 파싱: 근태 (시트별 결근일 합산)
        // 실제 파일 구조:
        //   row 10: 날짜, row 11: 요일(영), row 12: 요일(베트남어), row 13~: 직원 데이터
        //   col 0: STT(번호), col 1: 사번(MSNV), col 5: 부서, col 7~: 일별 출결
        // STT가 양의 정수인 행만 직원 행으로 인식 (F/OR 코드 모두 포함)
        const absMap = {};
        for (const shName of wb.SheetNames) {
          if (!["01","02","03","04","05","06","07","08","09","10","11","12"].includes(shName.trim())) continue;
          const shRows = XLSX.utils.sheet_to_json(wb.Sheets[shName], {header:1});
          // 날짜 행(row 10) 파싱 → 일요일 제외용
          const dateRow = shRows[10] ? shRows[10].slice(7) : [];
          const dayOfWeeks = (shRows[11] ? shRows[11].slice(7) : []).map(v=>String(v||"").trim());
          for (let i = 13; i < shRows.length; i++) {
            const row = shRows[i];
            if (!row) continue;
            // STT(col0)가 양의 정수인 행만 직원 행으로 인식
            const stt = row[0];
            if (typeof stt !== 'number' || !Number.isInteger(stt) || stt <= 0) continue;
            const rawId = row[1];
            if (!rawId) continue;
            const id = String(rawId).trim();
            if (!id) continue;
            const daily = row.slice(7);
            let abs = 0;
            for (let j = 0; j < daily.length; j++) {
              // 일요일(Sun/Chủ Nhật) 제외
              const dow = dayOfWeeks[j] || "";
              if (dow === "Sun" || dow === "Chủ Nhật") continue;
              const val = daily[j];
              if (!val && val !== 0) continue;
              const v = String(val).trim().toUpperCase();
              if (!v || v === "NAN") continue;
              if (!isNaN(parseFloat(v))) continue; // 숫자(근무시간)는 건너뜀
              if (["KP","NB","HL"].some(c=>v.includes(c))) abs += v.includes("/2")?0.5:1;
            }
            if (abs > 0) absMap[id] = (absMap[id]||0) + abs;
          }
        }
        setUploadedAbsence(absMap);
        setUploadStatus(prev=>({...prev,f6:`✓ ${Object.keys(absMap).length}명 근태 로드됨`}));
      }
    } catch(err) {
      setUploadStatus(prev=>({...prev,[fileType]:`오류: ${err.message}`}));
    }
  };

  // ── CSV 근태 추출 함수 ──────────────────────────────────────────────────
  const handleExportCSV = () => {
    const today = new Date();
    const dateStr = today.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\. /g,"-").replace(/\./g,"");
    const timeStr = today.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});

    const escape = v => `"${String(v||"").replace(/"/g,'""')}"`;
    const csvRows = [];

    // ── 헤더 (Excel 열기 시 자동 필터 적용 가능) ─────────────────────
    csvRows.push(["사번(Code)","이름","공정(Dept)","직책(Position)","G레벨","결근여부"].map(escape).join(","));

    // ── 직원 데이터 (원래 순서 그대로) ───────────────────────────────
    finalWorkers.forEach(w => {
      const isAbsent = absentIdsRef.current.has(w.id);
      const grade = w.subLevel && w.subLevel !== w.grade ? w.subLevel : w.grade;
      csvRows.push([
        escape(w.id),
        escape(w.name),
        escape(w.dept),
        escape(w.position),
        escape(grade),
        escape(isAbsent ? "X" : "O")
      ].join(","));
    });

    // ── 하단 요약: 공정별 결근 현황 ──────────────────────────────────
    csvRows.push(["","","","","",""].join(","));
    csvRows.push([escape("=== 공정별 요약 ==="),"","","","",""].join(","));
    csvRows.push([escape("공정"),escape("총인원"),escape("결근"),escape("출근"),escape("결근율"),""].join(","));
    const deptSummary = {};
    finalWorkers.forEach(w => {
      if (!deptSummary[w.dept]) deptSummary[w.dept] = {total:0, absent:0};
      deptSummary[w.dept].total++;
      if (absentIdsRef.current.has(w.id)) deptSummary[w.dept].absent++;
    });
    Object.entries(deptSummary)
      .sort((a,b) => a[0].localeCompare(b[0]))
      .forEach(([dept,{total,absent}]) => {
        const rate = total > 0 ? ((absent/total)*100).toFixed(1)+"%" : "0%";
        csvRows.push([escape(dept),total,absent,total-absent,escape(rate),""].join(","));
      });
    const totalAbsent = absentIdsRef.current.size;
    const totalAll = finalWorkers.length;
    csvRows.push(["","","","","",""].join(","));
    csvRows.push([escape("전체 합계"),totalAll,totalAbsent,totalAll-totalAbsent,escape(((totalAbsent/totalAll)*100).toFixed(1)+"%"),""].join(","));

    const csvContent = "\uFEFF" + csvRows.join("\n");
    const blob = new Blob([csvContent], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `AJS_근태_${dateStr}_${timeStr.replace(":","")}.csv`;
    link.click();
    URL.revokeObjectURL(url);
  };

  // 결근 ID를 ref로도 관리 (CSV 추출 시 closure 문제 방지)
  const absentIdsRef = React.useRef(new Set());

  // 매칭시스템: 직원 목록만 필요 (absentDays는 매칭에 불필요)
  const finalWorkers = activeWorkers;

  // HR탭 전용: 부서별 결근율 데이터 소스 계산
  // - 파일6 미업로드: LINE_ABS_RATES 하드코딩 기준선 사용
  // - 파일6 업로드: 업로드된 근태 데이터로 부서별 결근율 재계산
  const hrAbsenceRates = useMemo(() => {
    if (!uploadedAbsence) return LINE_ABS_RATES; // 기본값: 하드코딩 기준선
    // 부서별 인원 수 (activeWorkers 기준)
    const deptN = {};
    activeWorkers.forEach(w => { deptN[w.dept] = (deptN[w.dept]||0)+1; });
    // 업로드된 근태 데이터로 부서별 결근율 계산
    // uploadedAbsence: {id: absentDays} map
    const deptAbs = {};
    Object.entries(uploadedAbsence).forEach(([id, days]) => {
      const w = activeWorkers.find(x => x.id === id);
      if (!w) return;
      deptAbs[w.dept] = (deptAbs[w.dept]||0) + days;
    });
    const rates = {};
    Object.entries(deptN).forEach(([dept, n]) => {
      if (!PROCESS_INFO[dept]) return;
      const totalPossible = n * 26 * 2; // 2개월 기준
      const abs = deptAbs[dept]||0;
      const rate = +(abs / totalPossible * 100).toFixed(2);
      if (rate > 0) rates[dept] = rate;
    });
    return Object.keys(rates).length > 0 ? rates : LINE_ABS_RATES;
  }, [uploadedAbsence, activeWorkers]);

  // HR탭 전용: 직원별 결근일 map (만성결근자 탐지용)
  const hrWorkerAbsence = useMemo(() => {
    if (!uploadedAbsence) {
      // 기본값: RAW_DATA의 absentDays 사용
      const map = {};
      WORKERS.forEach(w => { if(w.absentDays > 0) map[w.id] = w.absentDays; });
      return map;
    }
    return uploadedAbsence;
  }, [uploadedAbsence]);

  return (
    <div style={{fontFamily:"'IBM Plex Mono','Courier New',monospace",background:"#0d1117",minHeight:"100vh",color:"#e6edf3",display:"flex",flexDirection:"column"}}>
      {/* TOP BAR */}
      <div style={{background:"#0d1117",borderBottom:"1px solid #21262d",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          {/* AJ Solutions 로고 */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <img src={LOGO_B64} alt="AJ Solutions" style={{width:32,height:32,objectFit:"contain"}}/>
            <div>
              <div style={{fontFamily:"'Archivo','IBM Plex Mono',sans-serif",fontSize:13,fontWeight:700,letterSpacing:"0.08em",color:"#e6edf3",lineHeight:1.1}}>AJ SOLUTIONS</div>
              <div style={{fontFamily:"'Archivo',sans-serif",fontSize:9,fontWeight:500,letterSpacing:"0.18em",color:"#6e7681",textTransform:"uppercase"}}>Production HR System</div>
            </div>
          </div>
          <div style={{width:1,height:28,background:"#21262d"}}/>
          {/* 탭 버튼 */}
          {[["matching","매칭 시스템"],["hr","HR 관리"]].map(([key,label])=>(
            <button key={key} onClick={()=>setMainTab(key)}
              style={{padding:"5px 14px",background:mainTab===key?"#161b22":"transparent",border:"none",
                borderRadius:4,color:mainTab===key?"#2A8FCB":"#8b949e",cursor:"pointer",fontSize:12,fontWeight:500,
                borderBottom:mainTab===key?"2px solid #2A8FCB":"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </div>
        {/* 우측: 파일 업로드 + 날짜 */}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {/* CSV 추출 버튼 */}
          <button onClick={handleExportCSV}
            style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
              background:"#161b22",border:"1px solid #30363d",borderRadius:5,padding:"4px 10px",fontSize:10,
              color:"#8b949e",outline:"none"}}>
            <span style={{color:"#34d399"}}>📥</span>
            <span>근태 데이터 추출</span>
          </button>
          {/* 파일1 업로드 */}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
            background:"#161b22",border:"1px solid #30363d",borderRadius:5,padding:"4px 10px",fontSize:10}}>
            <span style={{color:"#2A8FCB"}}>📁</span>
            <span style={{color:"#8b949e"}}>직원명단 리스트</span>
            {uploadStatus.f1&&<span style={{color:uploadStatus.f1.startsWith("✓")?"#34d399":"#f87171"}}>{uploadStatus.f1}</span>}
            <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>handleUpload(e,"f1")}/>
          </label>
          {/* 파일6 업로드 */}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
            background:"#161b22",border:"1px solid #30363d",borderRadius:5,padding:"4px 10px",fontSize:10}}>
            <span style={{color:"#2A8FCB"}}>📁</span>
            <span style={{color:"#8b949e"}}>근태 리스트</span>
            {uploadStatus.f6&&<span style={{color:uploadStatus.f6.startsWith("✓")?"#34d399":"#f87171"}}>{uploadStatus.f6}</span>}
            <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>handleUpload(e,"f6")}/>
          </label>
          <div style={{fontSize:10,color:"#6e7681"}}>{today} · {finalWorkers.length}명</div>
        </div>
      </div>
      {/* MAIN */}
      <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
        {mainTab==="matching"
          ?<MatchingDashboard workers={finalWorkers} onAbsentChange={ids=>{absentIdsRef.current=ids;}}/>
          :<HRDashboard workers={finalWorkers} absenceRates={hrAbsenceRates} workerAbsMap={hrWorkerAbsence}/>}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
